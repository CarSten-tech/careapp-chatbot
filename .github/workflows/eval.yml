name: Eval – Safety Gates

# Blocking CI für alle Safety-Critical Layer-5-Tests (§3 harte Gates + §5.1 Pilot-Checkliste).
# Jeder Merge auf main muss diesen Workflow bestehen.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Offline-Checks — kein DB-Server nötig (pilot_entry, kein db-Marker)
  # Läuft immer, blockiert den Merge.
  # ──────────────────────────────────────────────────────────────────────────
  pilot-entry-checks:
    name: Pilot Entry Checklist (offline)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: §5.1 Pilot-Eintrittscheckliste
        run: pytest tests/eval/test_pilot_checklist.py -m pilot_entry -v --tb=short

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Hard-Gate-Tests mit DB (§3 Golden Test Set C1–C17)
  # Benötigt PostgreSQL-Service (identische Schema-Version via Alembic).
  # ──────────────────────────────────────────────────────────────────────────
  hard-gates:
    name: Hard Gates – Golden Test Set (§3)
    runs-on: ubuntu-latest
    needs: pilot-entry-checks

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: careapp
          POSTGRES_PASSWORD: careapp
          POSTGRES_DB: careapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careapp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql+asyncpg://careapp:careapp@localhost:5432/careapp_test"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: §3 Hard Gates — Golden Test Set C1–C17 (blocking)
        run: pytest tests/eval/ -m "hard_gate and db" -v --tb=short

      - name: Upload eval report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: eval-failure-report
          path: /tmp/pytest-*.log
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Vollständige Eval-Suite als Report (non-blocking auf CI-Fail,
  # aber Workflow-Status bricht ab wenn Job 2 fehlschlägt)
  # ──────────────────────────────────────────────────────────────────────────
  eval-metrics-report:
    name: Eval Metrics Report
    runs-on: ubuntu-latest
    needs: hard-gates
    if: always()  # auch bei hard-gates-Failure anzeigen

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: careapp
          POSTGRES_PASSWORD: careapp
          POSTGRES_DB: careapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U careapp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: "postgresql+asyncpg://careapp:careapp@localhost:5432/careapp_test"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Full eval suite (alle Tests, Metriken-Report)
        run: >
          pytest tests/ -v --tb=short
          --junit-xml=/tmp/eval-report.xml
          || true

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-metrics-report
          path: /tmp/eval-report.xml
